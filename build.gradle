plugins {
    id 'java'
    id 'application'
}

group = 'com.github.sckwoky'
version = '0.1.0-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

application {
    mainClass = 'com.github.sckwoky.typegraph.cli.Main'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.jgrapht:jgrapht-core:1.5.2'
    implementation 'org.jgrapht:jgrapht-io:1.5.2'

    implementation 'com.github.javaparser:javaparser-symbol-solver-core:3.26.4'

    // Eclipse JDT Core (standalone, for semantic analysis)
    implementation 'org.eclipse.jdt:org.eclipse.jdt.core:3.40.0'
    implementation 'org.eclipse.jdt:ecj:3.40.0'

    implementation 'info.picocli:picocli:4.7.6'
    annotationProcessor 'info.picocli:picocli-codegen:4.7.6'

    testImplementation platform('org.junit:junit-bom:5.11.4')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testImplementation 'org.assertj:assertj-core:3.27.3'
}

tasks.named('test') {
    useJUnitPlatform()
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.compilerArgs.add('--enable-preview')
}

tasks.withType(JavaExec).configureEach {
    jvmArgs '--enable-preview', '--enable-native-access=ALL-UNNAMED'
}

tasks.withType(Test).configureEach {
    jvmArgs '--enable-preview', '--enable-native-access=ALL-UNNAMED'
    testLogging {
        showStandardStreams = true
        exceptionFormat = 'full'
    }
}
